name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gdext:
    name: gdext (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            platform: macos
            arch: universal
          - runner: windows-latest
            platform: windows
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SCons
        run: python -m pip install "scons>=4.0"

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build GDExtension (release)
        working-directory: gdext
        run: scons platform=${{ matrix.platform }} arch=${{ matrix.arch }} target=template_release

      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: sim_rts-${{ matrix.platform }}-${{ matrix.arch }}
          path: game/bin/
          if-no-files-found: error

  sim-tests:
    name: sim tests (headless determinism)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build & run sim tests if present
        shell: bash
        run: |
          if [ -f sim/CMakeLists.txt ]; then
            cmake -S sim -B sim/build -DCMAKE_BUILD_TYPE=Release
            cmake --build sim/build --config Release
            ctest --test-dir sim/build --output-on-failure
          else
            echo "sim/ has no CMakeLists.txt yet — B's PR adds the deterministic sim + tests. Skipping."
          fi
