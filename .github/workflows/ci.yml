name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gdext:
    name: gdext (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            platform: macos
            arch: universal
          - runner: windows-latest
            platform: windows
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SCons
        run: python -m pip install "scons>=4.0"

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build GDExtension (release)
        working-directory: gdext
        run: scons platform=${{ matrix.platform }} arch=${{ matrix.arch }} target=template_release

      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: sim_rts-${{ matrix.platform }}-${{ matrix.arch }}
          path: game/bin/
          if-no-files-found: error

  sim-tests:
    # Runs B's golden-replay determinism test (pinned hash) on every OS we ship/build
    # on. The hash assertion lives in the test, so a per-OS mismatch fails the job —
    # that's the cross-platform determinism proof (macOS-arm64 / Linux-x64 / Windows-x64).
    name: sim tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build & run sim tests if present
        shell: bash
        run: |
          if [ -f sim/CMakeLists.txt ]; then
            cmake -S sim -B sim/build -DCMAKE_BUILD_TYPE=Release
            cmake --build sim/build --config Release
            ctest --test-dir sim/build -C Release --output-on-failure
          else
            echo "sim/ has no CMakeLists.txt yet — B's PR adds the deterministic sim + tests. Skipping."
          fi

  smoke:
    # Boots the project in headless Godot to validate the GDScript/scene side the
    # way CI validates C++: the gdext must load (SimBridge registers), the mock sim
    # drives a few ticks through the bridge, and the scripts + main scene parse/load.
    name: godot headless smoke (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install SCons
        run: python -m pip install "scons>=4.0"
      - name: Build GDExtension (linux, debug)
        working-directory: gdext
        run: scons platform=linux arch=x86_64 target=template_debug
      - name: Download Godot 4.5 (linux)
        run: |
          set -euo pipefail
          ver=4.5-stable
          curl -fL -o godot.zip "https://github.com/godotengine/godot/releases/download/${ver}/Godot_v${ver}_linux.x86_64.zip"
          unzip -q godot.zip
          mv "Godot_v${ver}_linux.x86_64" godot-bin
          chmod +x godot-bin
      - name: Import resources (best-effort; generates .godot/)
        run: ./godot-bin --headless --path game --import 2>&1 | tail -20 || true
      - name: Run headless smoke test
        run: ./godot-bin --headless --path game -s res://tests/smoke_test.gd
